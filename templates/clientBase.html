
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{%block title%}Home Page{%endblock%}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <header class="header">
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">☰</button>
    <div class="header-left">
      <h1><a href="/" class="header-title-link">College Event Viewer (Govt. Polytechnic Hamirpur)</a></h1>
    </div>
    <div class="header-right"></div>
  </header>

  <div class="main">
    <aside class="sidebar" id="sidebar">
      <ul>
        <li><a href="/athletic">Athletic</a></li>
        <li><a href="/sports">Sports</a></li>
        <li><a href="/examination">Examination</a></li>
        <li><a href="daily.html">Daily</a></li>
        <li><a href="studies-admission.html">Studies and Admission</a></li>
        <div class="sidebar-spacer"></div>
        <li><a href="about.html">About</a></li>
        <li><a href="/admin-login">Admin</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </aside>

   {%block content%} {%endblock%}
  </div>

  <script>
    // Mobile sidebar toggle
    const toggle = document.getElementById('mobile-menu-toggle');
    const sidebar = document.getElementById('sidebar');
    if (toggle && sidebar) {
      toggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
      });

      sidebar.querySelectorAll('a').forEach((link) => {
        link.addEventListener('click', () => {
          sidebar.classList.remove('open');
        });
      });
    }
  </script>
</body>
</html>
