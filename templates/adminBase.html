<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{%block title%}Admin Panel{%endblock%}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>

<body>
    <header class="header">
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="header-left">
            <h1><a href="/" class="header-title-link">College Event Viewer</a></h1>
        </div>
        <div class="header-right">
            <span class="admin-name">Welcome {{ session['admin'] }}</span>
        </div>
    </header>

    <div class="main">
        <aside class="sidebar" id="sidebar">
            <ul>
                <li><a href="/notice">Notice</a></li>
                 <li><a href="/manage-athletic">Manage Athletic</a></li>
                 <li><a href="/manage-sports">Manage Sports</a></li>
                <div class="sidebar-spacer"></div>
                <li><a href="/register-admin">Register admin</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
        </aside>

        {%block content%} {%endblock%}
    </div>

    <script>
        // Mobile sidebar toggle
        const toggle = document.getElementById('mobile-menu-toggle');
        const sidebar = document.getElementById('sidebar');
        if (toggle && sidebar) {
            toggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });

            sidebar.querySelectorAll('a').forEach((link) => {
                link.addEventListener('click', () => {
                    sidebar.classList.remove('open');
                });
            });
        }
    </script>
</body>

</html>
